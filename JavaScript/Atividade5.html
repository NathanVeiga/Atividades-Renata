<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade</title>
</head>
<body>
<script> 
    let numerosInteiros = [1, 2, 3, 4, 5];

    for (const numero of numerosInteiros) {
        alert(numero); 
    }

    alert("Primeiro número: " + numerosInteiros[0]);
    alert("Último número: " + numerosInteiros[4]);
    alert("Soma: " + numerosInteiros[0] + numerosInteiros[4])
</script>
</body>
</html>
