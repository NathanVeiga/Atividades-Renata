<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade</title>
</head>
<body>
    <script>
        function soma (a, b) {
            return a + b;
        }

        function subtracao (a, b) {
            return a - b;
        }

        function multiplicacao (a, b) {
            return a * b;
        }

        function divisao (a, b) {
            return a / b;
        }

        alert("3 + 5 = "+ soma(3,5))
        alert("3 - 5 = "+ subtracao(3,5))
        alert("3 * 5 = "+ multiplicacao(3,5))
        alert("3 / 5 = "+ divisao(3,5))
    </script>
</body>
</html>
