<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .container {
            background-color: white;
            width: 90%;
            max-width: 450px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 8px;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid grey;
            border-radius: 4px;
            box-sizing: border-box;
        }

        input:focus, select:focus, textarea:focus {
            border-color: blue;
            outline: none;
        }

        .grupo-opcoes {
            margin-top: 5px;
        }

        .grupo-opcoes label {
            display: inline;
            font-weight: normal;
            margin-right: 15px;
        }

        textarea {
            height: 60px;
        }

        .botoes {
            margin-top: 20px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button:hover {
            background-color: darkblue;
        }

        button[type="reset"] {
            background-color: grey;
        }

        button[type="reset"]:hover {
            background-color: darkgrey;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Formulário de Cadastro</h2>

        <form>    
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com">

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha">

            <label for="dataNascimento">Data de nascimento:</label>
            <input type="date" id="dataNascimento" name="dataNascimento">

            <label for="curso">Curso:</label>
            <select id="curso" name="curso">
                <option value="">Selecione um curso</option>
                <option value="html">HTML e CSS</option>
                <option value="js">JavaScript</option>
            </select>

            <label>Sexo:</label>
            <div class="grupo-opcoes">
                <input type="radio" id="masc" name="sexo" value="M">
                <label for="masc">Masculino</label>
                
                <input type="radio" id="fem" name="sexo" value="F">
                <label for="fem">Feminino</label>
            </div>

            <label>Interesses:</label>
            <div class="grupo-opcoes">
                <input type="checkbox" id="prog" name="interesses" value="programacao">
                <label for="prog">Programação</label>
                
                <input type="checkbox" id="des" name="interesses" value="design">
                <label for="des">Design</label>
            </div>

            <label for="comentarios">Comentários:</label>
            <textarea id="comentarios" name="comentarios" placeholder="Digite seus comentários"></textarea>

            <label for="foto">Upload de foto:</label>
            <input type="file" id="foto" name="foto" accept="image/*">

            <div class="botoes">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </form>
    </div>

</body>
</html>
